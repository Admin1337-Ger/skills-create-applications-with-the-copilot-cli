<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .timezone-label {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .offset {
            font-size: 0.9em;
            color: #666;
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 5px;
        }

        .digital-time {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .date-display {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            margin-top: 10px;
        }

        .status-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 0.85em;
            color: #666;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 500;
        }

        .status-badge.night {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-weight: 600;
            color: #667eea;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .time-format-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .format-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .format-btn.active {
            background: white;
            color: #667eea;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
                margin-bottom: 25px;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .digital-time {
                font-size: 2em;
            }

            .btn {
                padding: 10px 16px;
                margin: 5px;
                font-size: 0.9em;
            }
        }

        .info-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 20px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Multi-Timezone Digital Clock</h1>
        
        <div class="time-format-toggle">
            <button class="format-btn active" onclick="setTimeFormat(true)">12-Hour</button>
            <button class="format-btn" onclick="setTimeFormat(false)">24-Hour</button>
        </div>

        <div class="clocks-grid" id="clocksGrid">
            <!-- Clock cards will be generated here -->
        </div>

        <div class="controls">
            <button class="btn" onclick="addCustomTimezone()">+ Add Timezone</button>
            <button class="btn" onclick="resetClocks()">Reset</button>
        </div>

        <div class="info-text">
            Times update every second • Click timezones to customize
        </div>
    </div>

    <script>
        // Default timezones
        const DEFAULT_TIMEZONES = [
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'Singapore', timezone: 'Asia/Singapore' }
        ];

        let timezones = [...DEFAULT_TIMEZONES];
        let use12HourFormat = true;

        function updateClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = '';

            timezones.forEach((tz, index) => {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.timezone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: use12HourFormat
                });

                const dateFormatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.timezone,
                    weekday: 'short',
                    month: 'short',
                    day: 'numeric'
                });

                const time = formatter.format(now);
                const date = dateFormatter.format(now);

                // Get hour to determine if it's night (between 19:00 and 07:00)
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz.timezone }));
                const hour = tzDate.getHours();
                const isNight = hour >= 19 || hour < 7;

                // Get UTC offset
                const tzFormatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.timezone,
                    timeZoneName: 'longOffset'
                });
                const parts = tzFormatter.formatToParts(now);
                const offset = parts.find(p => p.type === 'timeZoneName')?.value || '';

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.onclick = () => editTimezone(index);
                card.innerHTML = `
                    <div class="timezone-label">
                        <span>${tz.name}</span>
                        <span class="offset">${offset}</span>
                    </div>
                    <div class="digital-time">${time}</div>
                    <div class="date-display">${date}</div>
                    <div class="status-indicator">
                        <span class="status-badge ${isNight ? 'night' : ''}">
                            ${isNight ? '🌙 Night' : '☀️ Day'}
                        </span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setTimeFormat(use12Hour) {
            use12HourFormat = use12Hour;
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateClocks();
        }

        function addCustomTimezone() {
            const timezoneList = [
                'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
                'Europe/London', 'Europe/Paris', 'Europe/Berlin', 'Europe/Moscow',
                'Asia/Tokyo', 'Asia/Shanghai', 'Asia/Hong_Kong', 'Asia/Bangkok',
                'Asia/Dubai', 'Asia/Singapore', 'Asia/Kolkata', 'Australia/Sydney',
                'Australia/Melbourne', 'Pacific/Auckland', 'Africa/Cairo', 'Africa/Johannesburg'
            ];

            const name = prompt('Enter timezone name:', 'New City');
            if (!name) return;

            const tzInput = prompt('Enter timezone (e.g., America/New_York):\n\nCommon: ' + timezoneList.slice(0, 5).join(', ') + '...', 'America/New_York');
            if (!tzInput) return;

            timezones.push({ name, timezone: tzInput });
            updateClocks();
        }

        function editTimezone(index) {
            const tz = timezones[index];
            const newName = prompt('Edit timezone name:', tz.name);
            if (newName) {
                timezones[index].name = newName;
                updateClocks();
            }
        }

        function resetClocks() {
            timezones = [...DEFAULT_TIMEZONES];
            updateClocks();
        }

        // Update clocks every second
        setInterval(updateClocks, 1000);

        // Initial update
        updateClocks();
    </script>
</body>
</html>
